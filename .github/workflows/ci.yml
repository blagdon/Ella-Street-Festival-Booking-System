name: CI

on:
  # `push` is deliberately scoped to main. An unscoped `push:` fired a second,
  # duplicate run for every branch that also had a PR open, which interacts
  # badly with the integration-tests concurrency group below: GitHub only keeps
  # ONE pending run per group, and cancels any previously-pending one when a
  # newer run queues behind the in-progress one. The cancelled run still
  # reports a non-success `integration-tests` check against the head commit, so
  # branch protection treats the PR as failing and blocks the merge - for a run
  # that was never actually executed. Seen live on 2026-07-20 (PR #43), where
  # the pull_request run passed, the push run was cancelled, and the merge was
  # rejected until that one job was re-run by hand.
  #
  # Scoping to main gives exactly one run per PR (the pull_request event) plus
  # one on merge, which also halves contention on the shared test database.
  # Note this means pushing a branch with no PR open runs no CI - open the PR,
  # which is this repo's convention anyway.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Same checks as .githooks/pre-commit, run here too since a local git hook
  # can be bypassed (--no-verify, a fresh clone that never ran `npm install`,
  # etc.) - these are the guards that must never be skippable. See
  # HANDOVER.md's sibling-function-HTTP-call Gotcha (three real production
  # bugs in one session) and scripts/check-unescaped-innerhtml.mjs's own
  # header (four real XSS gaps) for what each one is guarding against.
  grep-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Sibling-call and innerHTML-escaping guards
        run: bash .githooks/pre-commit

  # css/output.css is a BUILD ARTEFACT that is committed to the repo (there is
  # no build step at deploy time - Vercel serves the committed file directly).
  # Tailwind only emits classes it finds by scanning the source, so introducing
  # a class the project has never used before and forgetting `npm run build:css`
  # ships markup referencing CSS that does not exist.
  #
  # That failure is SILENT and can be invisible rather than merely unstyled:
  # on 2026-07-21 a new `bg-amber-600 text-white` button rendered as white text
  # on a transparent background - the refund button was there, clickable, and
  # completely unreadable. The same rebuild also revealed
  # `disabled:cursor-not-allowed` had been missing since v7.1.0's Retry button,
  # unnoticed for days.
  #
  # Rebuilding and diffing is the only reliable check: `git status` alone won't
  # catch it, because the stale file is committed and therefore clean.
  css-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install
      - name: Rebuild Tailwind and fail if the committed CSS is stale
        run: |
          cp css/output.css /tmp/output.css.committed
          npm run build:css
          if ! diff -q /tmp/output.css.committed css/output.css > /dev/null; then
            echo "::error::css/output.css is stale - run 'npm run build:css' and commit the result."
            echo ""
            echo "Classes used in the source but missing from the committed CSS render as"
            echo "nothing at all, which for a coloured button means invisible, not unstyled."
            echo ""
            echo "Diff (committed -> freshly built):"
            diff /tmp/output.css.committed css/output.css || true
            exit 1
          fi
          echo "OK: css/output.css matches a fresh build."

  # Read-only schema dump against the LIVE project, diffed against the
  # checked-in rls_grants_snapshot.txt. Never writes anything - same
  # operation done manually via `supabase db dump` throughout this repo's
  # history, just automated. Needs SUPABASE_ACCESS_TOKEN (a personal access
  # token, not a project-specific key) as a repo secret.
  rls-grants-check:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: supabase/setup-cli@v1
        with:
          # Pinned (rather than "latest") so reruns are reproducible; bump
          # deliberately when a newer CLI is needed.
          version: 2.109.1
      - name: Link to the live project
        run: supabase link --project-ref rsnxhuhibglieofikkpo
      - name: Check RLS policies/grants match the committed snapshot
        run: bash scripts/check-rls-grants-snapshot.sh

  # Every file under tests/ (nine of them as of 2026-07-20 - integration,
  # workflow, security, stripe-payment, bank-transfer-payment, cors,
  # email-retry, google-reviews-cache, privilege-hardening) - all run only
  # against the disposable "test
  # backup" Supabase project (qeplpcnrkgpaawfyliap), every file hard-refuses
  # to run against anything else. Needs that project's URL/anon/service-role
  # keys, the seeded test admin's email/password, and a Stripe TEST-mode
  # secret key/webhook secret (never live keys) as repo secrets - the seed
  # step below writes the Stripe pair into the test project's own settings
  # table (Stripe credentials live there, not Edge Function env vars - see
  # HANDOVER.md's Stripe Payment Collection section), same as every other
  # settings-table row this suite depends on. Also needs the Edge Functions
  # deployed there and the Turnstile test secret set (see HANDOVER.md's
  # Testing section) - this workflow assumes that one-time setup is done,
  # it doesn't redo it on every run.
  integration-tests:
    runs-on: ubuntu-latest
    # All runs share the one test Supabase project, so two runs executing this
    # job at once corrupt each other's fixtures (seen 2026-07-17: two pushes
    # ~3s apart caused spurious "Booking not found" 404s and a missing
    # email_queue row). Queue this job globally instead of overlapping;
    # grep-guard and rls-grants-check stay parallel.
    #
    # `cancel-in-progress: false` must stay false: cancelling a run mid-suite
    # would abandon its fixtures in the shared database for the next run to
    # trip over. Note it does NOT prevent a *pending* run being cancelled when
    # a newer one queues behind - that is a separate GitHub behaviour, and the
    # reason the `push` trigger above is scoped to main.
    concurrency:
      group: integration-tests-shared-db
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install
      - name: Write .env.test
        run: |
          cat <<EOF > .env.test
          TEST_SUPABASE_URL=${{ secrets.TEST_SUPABASE_URL }}
          TEST_SUPABASE_ANON_KEY=${{ secrets.TEST_SUPABASE_ANON_KEY }}
          TEST_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          TEST_ADMIN_EMAIL=${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD=${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_STRIPE_SECRET_KEY=${{ secrets.TEST_STRIPE_SECRET_KEY }}
          TEST_STRIPE_WEBHOOK_SECRET=${{ secrets.TEST_STRIPE_WEBHOOK_SECRET }}
          EOF
      - name: Ensure test fixtures (idempotent)
        run: npm run test:setup
      - name: Run integration/workflow/security tests
        run: npm run test:integration
