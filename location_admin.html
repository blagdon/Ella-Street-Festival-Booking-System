<!DOCTYPE html>
<html>

<head>
    <title>Location Manager (Direct DB)</title>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://challenges.cloudflare.com https://vercel.live; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; connect-src 'self' https://rsnxhuhibglieofikkpo.supabase.co https://challenges.cloudflare.com https://vercel.live https://cdn.jsdelivr.net https://unpkg.com; frame-src https://challenges.cloudflare.com https://vercel.live; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com;">
    <link href="./css/output.css" rel="stylesheet">
    <style>
        *:focus {
            outline: none;
            /* Tailwind handles the ring via classes */
        }


        /* Location card styles */
        .location-card {
            background: white;
            border-radius: 0.75rem;
            border: 2px solid #e5e7eb;
            padding: 1rem;
            margin-bottom: 0.75rem;
            transition: all 0.2s;
            min-height: 44px;
        }

        .location-card.assigned {
            border-color: #10b981;
            background: linear-gradient(135deg, #ecfdf5 0%, #ffffff 100%);
        }

        .location-card.unassigned {
            border-color: #fbbf24;
            background: linear-gradient(135deg, #fef3c7 0%, #ffffff 100%);
        }

        .location-card:active {
            transform: scale(0.98);
        }

        /* Bottom sheet for location selection */
        .location-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 1.5rem 1.5rem 0 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        .location-sheet.open {
            transform: translateY(0);
        }

        .location-sheet-handle {
            width: 40px;
            height: 4px;
            background: #d1d5db;
            border-radius: 2px;
            margin: 12px auto 8px;
        }

        .location-sheet-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .location-sheet-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }

        /* Location option buttons */
        .location-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #f3f4f6;
            min-height: 60px;
            transition: background 0.2s;
        }

        .location-option:active {
            background: #f9fafb;
        }

        .location-option.available {
            background: white;
        }

        .location-option.occupied {
            background: #fee2e2;
            opacity: 0.6;
        }

        .location-option.current {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
        }

        /* Quick action buttons */
        .mobile-action-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .mobile-action-pill:active {
            transform: scale(0.95);
        }

        /* Stats cards */
        .stat-card {
            background: white;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid #e5e7eb;
            text-align: center;
        }

        /* Pull to refresh */
        .pull-indicator {
            position: absolute;
            top: -60px;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .pull-indicator.pulling {
            transform: translateY(60px);
        }
    </style>

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎪</text></svg>">
</head>

<body class="bg-gray-100 min-h-screen font-sans text-gray-800 flex flex-col">

    <div id="nav-container"></div>

    <div class="px-4 md:px-6 py-3 bg-gray-50 border-b flex flex-wrap gap-2 items-center">
        <span class="text-xs font-bold text-gray-400 uppercase tracking-wider mr-2">Filter:</span>
        <button id="btn-filter-all"
            class="px-3 py-2 min-h-11 text-xs font-bold rounded-md bg-white shadow text-gray-800 active:bg-gray-100 transition-colors">All</button>
        <button id="btn-filter-unassigned"
            class="px-3 py-2 min-h-11 text-xs font-bold rounded-md text-gray-500 hover:bg-white hover:shadow active:bg-gray-100 transition-colors">Unassigned</button>
        <button id="btn-filter-assigned"
            class="px-3 py-2 min-h-11 text-xs font-bold rounded-md text-gray-500 hover:bg-white hover:shadow active:bg-gray-100 transition-colors">Assigned</button>

        <select id="sortSelect"
            class="px-3 py-2 min-h-11 text-xs font-bold bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 cursor-pointer">
            <option value="id-asc">Sort: ID (A→Z)</option>
            <option value="id-desc">Sort: ID (Z→A)</option>
            <option value="business-asc">Sort: Business Name (A→Z)</option>
            <option value="business-desc">Sort: Business Name (Z→A)</option>
        </select>

        <div class="ml-auto flex gap-2">
            <button id="btn-refresh-data"
                class="px-3 py-2 min-h-11 text-xs font-bold rounded-md bg-white shadow text-gray-600 hover:text-blue-600 active:bg-gray-100 transition-colors flex items-center gap-2"
                title="Refresh Data">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                    </path>
                </svg>
                <span class="hidden sm:inline">Refresh</span>
            </button>
            <button id="btn-download-mymaps"
                class="px-3 py-2 min-h-11 text-xs font-bold rounded-md bg-white shadow text-gray-600 hover:text-blue-600 active:bg-gray-100 transition-colors flex items-center gap-2"
                title="Download CSV for Google My Maps">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3">
                    </path>
                </svg>
                <span class="hidden sm:inline">Download for My Maps</span>
            </button>
            <button id="btn-send-bulk-emails"
                class="px-3 py-2 min-h-11 text-xs font-bold rounded-md bg-blue-600 text-white shadow hover:bg-blue-700 active:bg-blue-800 transition-colors flex items-center gap-2"
                title="Send Emails to All Assigned">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                    </path>
                </svg>
                Email Allocations
            </button>
        </div>
    </div>

    <div class="px-4 md:px-6 py-3 bg-white border-b">
        <div class="relative max-w-md">
            <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" id="searchInput" placeholder="Search by business, owner, or booking ID..."
                class="w-full pl-9 pr-3 py-2 min-h-11 text-sm border border-gray-300 rounded-md focus:ring-1 focus:ring-blue-500 focus:outline-none">
        </div>
    </div>

    <div class="flex-grow p-6 overflow-hidden flex flex-col">
        <!-- Mobile Stats (visible on mobile only) -->
        <div class="md:hidden mb-4 grid grid-cols-3 gap-3">
            <div class="stat-card">
                <div class="text-2xl font-bold text-gray-900" id="mobile-total">0</div>
                <div class="text-xs text-gray-500 mt-1">Total</div>
            </div>
            <div class="stat-card">
                <div class="text-2xl font-bold text-green-600" id="mobile-assigned">0</div>
                <div class="text-xs text-gray-500 mt-1">Assigned</div>
            </div>
            <div class="stat-card">
                <div class="text-2xl font-bold text-yellow-600" id="mobile-unassigned">0</div>
                <div class="text-xs text-gray-500 mt-1">Pending</div>
            </div>
        </div>

        <!-- Desktop: Table View -->
        <div
            class="desktop-table hidden md:flex bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex-col h-full">
            <div class="overflow-y-auto custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 sticky top-0 z-10 border-b">
                        <tr>
                            <th class="px-6 py-3 text-xs font-bold text-gray-500 uppercase w-24">ID</th>
                            <th class="px-6 py-3 text-xs font-bold text-gray-500 uppercase">Business</th>
                            <th class="px-6 py-3 text-xs font-bold text-gray-500 uppercase">Type / Power</th>
                            <th class="px-6 py-3 text-xs font-bold text-gray-500 uppercase w-48">Location</th>
                            <th class="px-6 py-3 text-xs font-bold text-gray-500 uppercase text-center w-24">Actions
                            </th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>

        <!-- Mobile: Card View -->
        <div class="mobile-cards md:hidden">
            <div class="relative">
                <div id="pullIndicator" class="pull-indicator">
                    <svg class="w-5 h-5 mr-2 text-gray-400 hidden" id="pullSpinner" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                        </path>
                    </svg>
                    <span class="text-sm text-gray-500" id="pullText">Pull to refresh</span>
                </div>
                <div id="mobileCards" class="space-y-3">
                    <!-- Cards populated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile: Location Selection Bottom Sheet -->
    <div id="locationSheetBackdrop" class="location-sheet-backdrop md:hidden"></div>
    <div id="locationSheet" class="location-sheet md:hidden">
        <div class="location-sheet-handle"></div>

        <div class="px-6 py-4 border-b border-gray-200 sticky top-0 bg-white z-10">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-lg font-bold text-gray-800">Select Location</h3>
                <button id="btn-close-location-sheet" class="text-gray-400 hover:text-gray-600 p-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div id="sheetBookingInfo" class="text-sm text-gray-600">
                <!-- Booking info populated by JS -->
            </div>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar">
            <div id="locationOptions">
                <!-- Location options populated by JavaScript -->
            </div>
        </div>

        <div class="p-4 border-t border-gray-200 bg-gray-50">
            <button id="btn-clear-assignment"
                class="w-full bg-gray-200 text-gray-700 font-semibold py-3 rounded-lg hover:bg-gray-300 transition">
                Clear Assignment
            </button>
        </div>
    </div>


    <div id="flashToast"
        class="fixed bottom-5 right-5 z-50 transform transition-all duration-300 translate-y-20 opacity-0 pointer-events-none">
        <div class="bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg flex items-center">
            <span id="flashMessage" class="font-medium text-sm">Action Successful</span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/vendor/supabase.js"></script>
    <script type="module" src="./js/page-location-admin.js"></script>
</body>

</html>
