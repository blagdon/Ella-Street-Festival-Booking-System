<!DOCTYPE html>
<html>

<head>
    <title>Audit Log — ESF26 Admin</title>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://challenges.cloudflare.com https://vercel.live; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; connect-src 'self' https://rsnxhuhibglieofikkpo.supabase.co https://challenges.cloudflare.com https://vercel.live https://cdn.jsdelivr.net https://unpkg.com; frame-src https://challenges.cloudflare.com https://vercel.live; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="./css/output.css" rel="stylesheet">
    <link href="./css/admin.css" rel="stylesheet">

    <script src="js/vendor/supabase.js"></script>

    <style>
        details.details-cell[open] summary {
            margin-bottom: 0.5rem;
        }

        details.details-cell summary {
            list-style: none;
        }

        details.details-cell summary::-webkit-details-marker {
            display: none;
        }
    </style>

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎪</text></svg>">
</head>

<body class="bg-gray-100 min-h-screen font-sans text-gray-800 flex flex-col">

    <div id="nav-container"></div>

    <div class="px-4 md:px-6 py-4 bg-white border-b border-gray-200">
        <div class="flex items-center gap-3 mb-1">
            <a href="more.html"
                class="inline-flex items-center text-gray-500 hover:text-blue-600 transition-colors group bg-gray-50 px-2 py-1 rounded border border-gray-200 text-xs font-bold uppercase tracking-wide">
                <svg class="w-3 h-3 mr-1.5 group-hover:-translate-x-0.5 transition-transform" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Tools
            </a>
            <div>
                <h1 class="text-xl font-bold text-gray-800">Audit Log</h1>
                <p class="text-xs text-gray-500 mt-0.5">Every recorded admin action, across all instances. Search by
                    booking ID, action, or user to reconstruct what happened.</p>
            </div>
        </div>
    </div>

    <div class="px-4 md:px-6 py-3 bg-gray-50 border-b flex flex-wrap gap-2 items-center">
        <div class="relative flex-1 min-w-[220px] max-w-md">
            <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" id="searchInput" placeholder="Search booking ID, user, action, or details..."
                class="w-full pl-9 pr-3 py-2 min-h-11 text-sm border border-gray-300 rounded-md focus:ring-1 focus:ring-blue-500 focus:outline-none">
        </div>

        <select id="actionFilter"
            class="px-3 py-2 min-h-11 text-xs font-bold bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 cursor-pointer">
            <option value="All">All Actions</option>
        </select>

        <div class="ml-auto flex gap-2">
            <button id="btn-refresh"
                class="px-3 py-2 min-h-11 text-xs font-bold rounded-md bg-white shadow text-gray-600 hover:text-blue-600 active:bg-gray-100 transition-colors flex items-center gap-2"
                title="Refresh">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                    </path>
                </svg>
                <span class="hidden sm:inline">Refresh</span>
            </button>
        </div>
    </div>

    <div class="flex-grow px-4 md:px-6 py-4 overflow-hidden flex flex-col">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col flex-1">
            <div class="overflow-y-auto custom-scrollbar flex-1">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 sticky top-0 z-10 border-b">
                        <tr>
                            <th class="px-4 py-3 text-xs font-bold text-gray-500 uppercase w-40">Time</th>
                            <th class="px-4 py-3 text-xs font-bold text-gray-500 uppercase w-40">Action</th>
                            <th class="px-4 py-3 text-xs font-bold text-gray-500 uppercase w-48">Target</th>
                            <th class="px-4 py-3 text-xs font-bold text-gray-500 uppercase w-56">User</th>
                            <th class="px-4 py-3 text-xs font-bold text-gray-500 uppercase w-20">Instance</th>
                            <th class="px-4 py-3 text-xs font-bold text-gray-500 uppercase">Details</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="6" class="px-4 py-10 text-center text-gray-400 text-sm animate-pulse">Loading
                                audit log...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="border-t border-gray-100 px-4 py-3 flex items-center justify-between shrink-0">
                <span id="recordCount" class="text-xs text-gray-400">0 records</span>
                <button id="btn-load-more"
                    class="hidden px-3 py-2 min-h-11 text-xs font-bold rounded-md bg-gray-100 hover:bg-gray-200 text-gray-700 transition-colors">
                    Load older entries
                </button>
            </div>
        </div>
    </div>

    <div id="flashToast"
        class="fixed bottom-5 right-5 z-50 transform transition-all duration-300 translate-y-20 opacity-0 pointer-events-none">
        <div class="bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg flex items-center">
            <span id="flashMessage" class="font-medium text-sm">Action Successful</span>
        </div>
    </div>

    <script type="module" src="./js/page-audit-log.js"></script>
</body>

</html>
