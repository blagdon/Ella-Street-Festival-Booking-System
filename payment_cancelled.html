<!DOCTYPE html>
<html>

<head>

  <title>Payment Cancelled</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon"

<body class="bg-gray-50 min-h-screen flex items-center justify-center py-10 px-4">
  <div class="max-w-lg w-full p-8 bg-white rounded-xl shadow-md border border-gray-200 text-center">
    <svg class="w-14 h-14 text-yellow-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path>
    </svg>
    <h2 class="text-2xl font-bold text-gray-800 mb-2">Payment Cancelled</h2>
    <p class="text-sm text-gray-600 mb-4">
      Your payment was not completed, and no money has been taken. Your booking has not been confirmed yet.
    </p>
    <p class="text-xs text-gray-400">
      If you'd still like to complete your booking, please contact us and we can send you a new payment link.
    </p>
  </div>

</html>
