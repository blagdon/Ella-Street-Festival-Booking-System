<!DOCTYPE html>
<html>

<head>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://challenges.cloudflare.com https://cdn.tailwindcss.com https://vercel.live; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.tailwindcss.com; connect-src 'self' https://rsnxhuhibglieofikkpo.supabase.co https://challenges.cloudflare.com https://vercel.live https://cdn.jsdelivr.net https://unpkg.com; frame-src https://challenges.cloudflare.com https://vercel.live; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com;">
  <title>ESF26 Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="./css/output.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎪</text></svg>">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div id="loadingState" class="text-center">
    <div class="animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto"></div>
    <p class="text-sm text-gray-400 mt-3">Checking session...</p>
  </div>

  <div id="loginCard" class="bg-white p-8 rounded-xl shadow-lg border border-gray-200 w-full max-w-md hidden">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900">ESF26 Admin</h1>
      <p class="text-sm text-gray-500 mt-1">Sign in to manage the festival</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">Email</label>
        <input type="email" id="loginEmail" required autocomplete="email"
          class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
      <div>
        <div class="flex justify-between items-center mb-1">
          <label class="block text-sm font-bold text-gray-700">Password</label>
          <button type="button" id="link-forgot-password"
            class="text-xs text-blue-600 hover:text-blue-800 hover:underline">Forgot?</button>
        </div>
        <input type="password" id="loginPassword" required autocomplete="current-password"
          class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
      <button type="submit" id="loginBtn"
        class="w-full bg-blue-700 text-white font-bold py-3 px-6 rounded-lg hover:bg-blue-800 transition duration-200">
        Sign In
      </button>
    </form>

    <div id="loginError"
      class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700 text-center"></div>

    <p class="mt-6 text-xs text-gray-400 text-center">Ella Street Festival 2026 — Admin Portal</p>
  </div>

  <div id="resetCard" class="bg-white p-8 rounded-xl shadow-lg border border-gray-200 w-full max-w-md hidden">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900">Reset Password</h1>
      <p class="text-sm text-gray-500 mt-1">Enter your admin email to receive a reset link.</p>
    </div>

    <form id="resetForm" class="space-y-4">
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">Email</label>
        <input type="email" id="resetEmail" required autocomplete="email"
          class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
      <button type="submit" id="resetBtn"
        class="w-full bg-gray-800 text-white font-bold py-3 px-6 rounded-lg hover:bg-gray-900 transition duration-200">
        Send Reset Link
      </button>
    </form>

    <div id="resetMessage" class="hidden mt-4 p-3 rounded-lg text-sm text-center"></div>

    <div class="mt-6 text-center">
      <button type="button" id="link-back-login"
        class="text-sm text-blue-600 hover:text-blue-800 font-bold hover:underline">
        ← Back to Sign In
      </button>
    </div>
  </div>

  <script type="module" src="./js/page-login.js"></script>
</body>

</html>
