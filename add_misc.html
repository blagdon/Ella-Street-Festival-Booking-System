<!DOCTYPE html>
<html>

<head>
    <title>Add Misc Entry — ESF26 Admin</title>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://challenges.cloudflare.com https://cdn.tailwindcss.com https://vercel.live; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.tailwindcss.com; connect-src 'self' https://rsnxhuhibglieofikkpo.supabase.co https://qeplpcnrkgpaawfyliap.supabase.co https://challenges.cloudflare.com https://vercel.live https://cdn.jsdelivr.net https://unpkg.com; frame-src https://challenges.cloudflare.com https://vercel.live; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="./css/output.css" rel="stylesheet">
    <script src="js/vendor/supabase.js"></script>

    <style>
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎪</text></svg>">
</head>

<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <div id="nav-container"></div>

    <div class="max-w-3xl mx-auto px-4 md:px-6 py-6 md:py-10">

        <!-- Header -->
        <div class="mb-6 md:mb-8 flex items-center gap-3">
            <a href="booking_forms.html"
                class="inline-flex items-center text-gray-500 hover:text-blue-600 transition-colors group bg-white px-3 py-2 rounded-lg border border-gray-200 text-xs font-bold uppercase tracking-wide shadow-sm">
                <svg class="w-3 h-3 mr-1.5 group-hover:-translate-x-0.5 transition-transform" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back
            </a>
            <div>
                <h1 class="text-xl font-bold text-gray-800">Add Misc Entry</h1>
                <p class="text-sm text-gray-500">Manually add a confirmed miscellaneous/attraction entry.</p>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 md:p-8">
            <h2 class="text-base font-bold text-gray-800 mb-6 flex items-center gap-2 border-b border-gray-100 pb-4">
                <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path>
                </svg>
                Entry Details
            </h2>

            <form id="miscForm" class="space-y-5">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Business Name <span
                                class="text-red-500">*</span></label>
                        <input type="text" id="entryBusiness" required
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm bg-white shadow-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Owner Name <span
                                class="text-red-500">*</span></label>
                        <input type="text" id="entryOwner" required
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm bg-white shadow-sm">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Stall Type</label>
                        <select id="entryType"
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm bg-white shadow-sm">
                            <option value="">-- Select Type --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Category</label>
                        <input type="text" id="entryCategory" placeholder="e.g. Activity, Sponsor, Facilities"
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm bg-white shadow-sm">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Email</label>
                        <input type="email" id="entryEmail" placeholder="user@example.com"
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm bg-white shadow-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Phone</label>
                        <input type="tel" id="entryPhone"
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm bg-white shadow-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">Address / Location Reference</label>
                    <input type="text" id="entryAddress"
                        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm bg-white shadow-sm">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">Operation Description <span
                            class="text-gray-400 font-normal">(Publicly visible)</span></label>
                    <textarea id="entryDescription" rows="4"
                        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm bg-white shadow-sm"></textarea>
                </div>

                <div class="pt-4 border-t border-gray-100 flex justify-end">
                    <button type="submit" id="submitBtn"
                        class="bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-bold py-2.5 px-6 rounded-lg shadow-sm transition-all focus:ring-4 focus:ring-indigo-100">
                        Create Misc Entry
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="./js/page-add-misc.js"></script>
</body>

</html>
